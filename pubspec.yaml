name: markdone
description: "MarkDone! is a minimal, portable Markdown task tracker."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.3.0

environment:
  sdk: ^3.11.1
  flutter: ^3.41.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.2.1

  # File system & paths
  path_provider: ^2.1.5
  path: ^1.9.1

  # YAML frontmatter parsing
  yaml: ^3.1.3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Calendar integration
  device_calendar: ^4.3.3

  # Permissions
  permission_handler: ^12.0.1

  # Timezone support
  timezone: ^0.9.4

  # UUID generation for calendar events
  uuid: ^4.5.1

  # Intl for date formatting
  intl: ^0.20.2

  # Persistent settings
  shared_preferences: ^2.3.5

  # File picker (for choosing storage folder)
  file_picker: ^10.3.10
  flutter_timezone: ^5.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/combined.png"
  remove_alpha_ios: true
  min_sdk_android: 26
  adaptive_icon_background: "#1b3438"
  adaptive_icon_foreground: "assets/icon/foreground.png"

flutter:
  uses-material-design: true
